{% extends "base.html" %}

{% block title %}Products{% endblock %}

{% block body %}
    <nav>
        <a href="{{ url_for('users_bp.home') }}">Home</a>
        <a href="{{ url_for('users_bp.my_cart') }}">My Cart</a>
        <a href="{{ url_for('users_bp.logout') }}">Logout</a>

        <input type="text" placeholder="Search..." class="search-bar">
    </nav>

    <h2>Products</h2>
    <ul class="product-list">
        {% for product in products %}
            <li>
                Product Name: :{{ product.name }}<br>
                Price: ${{ product.price }}<br>
                Available: {{ product.amount }}<br>
                <img src="{{ product.image }}" alt="{{ product.name }}" width="100">
                <form action="{{ url_for('users_bp.add_to_cart_page', product_id=product.id) }}" method="POST">
                    <button type="submit">Add to cart</button>
                </form>
            </li>
        {% endfor %}
    </ul>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
