apiVersion: batch/v1
kind: Job
metadata:
  name: flask-migration
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: omarsa999/e-commerce-app:$BUILD_NUMBER
          workingDir: /app
          command: ["uv", "run", "flask", "--app", "run:app", "db", "upgrade"]
          envFrom:
            - secretRef:
                name: app-secrets